services:

  # ── Приложение ──────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: borrowtime-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_ADDR: redis:6379
      MINIO_ENDPOINT: minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - borrowtime

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: borrowtime-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-borrowtime}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-borrowtime}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"          # только для локальной разработки; убрать в проде
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-borrowtime} -d ${POSTGRES_DB:-borrowtime}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - borrowtime

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: borrowtime-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"          # только для локальной разработки
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - borrowtime

  # ── MinIO (S3-совместимое хранилище) ────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: borrowtime-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"          # S3 API
      - "9001:9001"          # Web-консоль
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - borrowtime

  # ── MinIO: создание бакета при первом запуске ────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: borrowtime-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "
        mc alias set local http://minio:9000 $${MINIO_ACCESS_KEY:-minioadmin} $${MINIO_SECRET_KEY:-minioadmin} &&
        mc mb --ignore-existing local/$${MINIO_BUCKET:-borrowtime} &&
        mc anonymous set none local/$${MINIO_BUCKET:-borrowtime} &&
        echo 'MinIO bucket ready'
      "
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-borrowtime}
    networks:
      - borrowtime
    restart: "no"

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  borrowtime:
    driver: bridge
